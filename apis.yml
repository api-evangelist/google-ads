name: Google Ads
description: The Google Ads API is the modern programmatic interface to Google 
  Ads and the next generation of the AdWords API. It enables developers to 
  interact directly with the Google Ads platform, vastly increasing the 
  efficiency of managing large or complex Google Ads accounts and campaigns.
