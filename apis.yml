  - name: Google Ads Scripts
    description: >-
      JavaScript-based scripting interface for programmatically managing and
      querying Google Ads data directly in a browser-based IDE. Scripts enable
      automated changes to campaigns, ad groups, and reporting without requiring
      a full API integration.
    image: 
      https://www.gstatic.com/images/branding/product/1x/google_ads_64dp.png
